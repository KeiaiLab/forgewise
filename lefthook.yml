# lefthook.yml — forgewise Python 4 계층 게이트
#
# 출처: docs/specs/2026-05-21-forgewise-governance-and-ops-alignment-design.md §Phase 1
# RFC-0002 (GHA 영구 금지) 정합. 모든 게이트는 로컬에서 실행.
#
# S4 Phase 6 (2026-05-21): readme-i18n-sync hook 추가 — README 4-lang drift 검사
# (operator-commons docs/i18n/README.md §5.1 정합).
#
# 우회 정책:
# - 전체 우회: `LEFTHOOK=0 git commit ...` 또는 commit message 에 `[skip-hooks]`
# - 개별 hook 우회: 각 hook 의 env 항목 (사유 PR / commit body 의무 기술)
# - DCO 우회 (`DCO_OK=1`): 강력 비권장 — keiailab organization 표준 위배
# - readme-i18n-sync 우회: SKIP_CHECK_README_SYNC=1 (전체) / SKIP_CHECK_README_SYNC_{KO,JA,ZH}=1 (개별)

min_version: 1.5.0

pre-commit:
  parallel: true
  commands:
    py-lint:
      glob: "*.py"
      run: uv run ruff check --fix {staged_files}
      stage_fixed: true
    py-format:
      glob: "*.py"
      run: uv run ruff format --check {staged_files}
    secrets:
      # detect-secrets baseline 미생성 시 graceful skip (Phase 1 정책)
      # baseline 생성: `uv run detect-secrets scan > .secrets.baseline`
      run: |
        if [ ! -f .secrets.baseline ]; then
          echo "secrets: .secrets.baseline 미생성 — graceful skip (baseline 생성 권장)"
          exit 0
        fi
        if ! command -v detect-secrets-hook >/dev/null 2>&1; then
          echo "secrets: detect-secrets 미설치 — graceful skip (uv tool install detect-secrets 권장)"
          exit 0
        fi
        detect-secrets-hook --baseline .secrets.baseline {staged_files}
    md-lint:
      glob: "*.md"
      run: |
        if ! command -v markdownlint-cli2 >/dev/null 2>&1; then
          echo "md-lint: markdownlint-cli2 미설치 — graceful skip (npm i -g markdownlint-cli2 권장)"
          exit 0
        fi
        markdownlint-cli2 {staged_files}

commit-msg:
  commands:
    commitlint:
      # Conventional Commits 검증 (self-implemented regex — commitlint 미의존)
      # 양식: <type>(<scope>)?: <subject>
      # type ∈ {feat, fix, docs, style, refactor, perf, test, build, ci, chore, revert, spec}
      run: |
        msg_file="{1}"
        # 첫 비주석 / 비공백 라인 검사
        subject=$(grep -m1 -v '^#' "$msg_file" | head -n1 | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
        if [ -z "$subject" ]; then
          echo "commitlint: subject empty"
          exit 1
        fi
        # Merge / Revert auto-generated 허용
        case "$subject" in
          Merge*|Revert*) exit 0 ;;
        esac
        pattern='^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert|spec)(\([^)]+\))?: .+'
        if ! echo "$subject" | grep -Eq "$pattern"; then
          echo "commitlint: Conventional Commits 위배"
          echo "  subject: $subject"
          echo "  요구 양식: <type>(<scope>)?: <subject>"
          echo "  type: feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert|spec"
          exit 1
        fi
    dco-signoff:
      # DCO `Signed-off-by:` line 검증
      # 우회: env DCO_OK=1 (사유 PR 본문 의무 기술 — keiailab 표준 위배)
      run: |
        if [ "$DCO_OK" = "1" ]; then
          echo "dco-signoff: DCO_OK=1 — bypass (사유 PR 본문 의무 기술)"
          exit 0
        fi
        msg_file="{1}"
        if ! grep -Eq '^Signed-off-by: .+ <.+@.+>$' "$msg_file"; then
          echo "dco-signoff: 'Signed-off-by:' line 부재"
          echo "  추가 방법: git commit -s ..."
          exit 1
        fi

pre-push:
  parallel: false
  commands:
    py-typecheck:
      run: uv run --python 3.11 --extra dev mypy --strict forgewise tests
    py-test:
      run: uv run --python 3.11 --extra dev python -m pytest -q
    py-audit:
      # pip-audit 미설치 또는 실행 불가 (pyenv shim w/o active Python install) graceful skip.
      # 별 후속 (CONTRIBUTING.md 안내). bug fix: `command -v` 가 pyenv shim path 만 잡고 실
      # 실행 시 `command not found` (pyenv error) → 실 작동 verify 강화.
      run: |
        if ! pip-audit --version >/dev/null 2>&1; then
          echo "py-audit: pip-audit 실행 불가 — graceful skip (uv tool install pip-audit 권장)"
          exit 0
        fi
        pip-audit
    readme-i18n-sync:
      # README.md (EN canonical) ↔ README.{ko,ja,zh}.md drift check (S4 Phase 6).
      # operator-commons docs/i18n/README.md §5.1 정합 — pre-push 위치 (작업 흐름 마찰 적음).
      # 언어별 임계값: KO 15% / JA 25% / ZH 30%.
      # 우회: SKIP_CHECK_README_SYNC=1 (전체) / SKIP_CHECK_README_SYNC_{KO,JA,ZH}=1 (개별).
      run: |
        if [ ! -f scripts/check-readme-sync.sh ]; then
          echo "readme-i18n-sync: scripts/check-readme-sync.sh 미존재 — graceful skip (operator-commons sync 권장)"
          exit 0
        fi
        bash scripts/check-readme-sync.sh

    # ─── audit P0-9 보강 — uv.lock drift (2026-05-21, commons ADR-0015 정합) ──
    uv-lock-drift:
      glob: "pyproject.toml"
      run: |
        if ! command -v uv >/dev/null 2>&1; then
          echo "uv-lock-drift: uv 미설치 — graceful skip"
          exit 0
        fi
        cp uv.lock /tmp/uv.lock.bak 2>/dev/null || true
        uv lock 2>/dev/null
        if ! diff -q uv.lock /tmp/uv.lock.bak >/dev/null 2>&1; then
          cp /tmp/uv.lock.bak uv.lock 2>/dev/null || true
          rm -f /tmp/uv.lock.bak
          echo "❌ uv-lock-drift: pyproject.toml 변경 후 uv.lock 갱신 누락"
          echo "   해결: uv lock && git add uv.lock && git commit --amend"
          exit 1
        fi
        rm -f /tmp/uv.lock.bak

    # ─── audit P1-13 보강 — markdown link check (commons ADR-0015 정합) ──
    markdown-link-check:
      glob: "*.md"
      run: |
        if ! command -v markdown-link-check >/dev/null 2>&1; then
          echo "markdown-link-check: 미설치 — graceful skip"
          exit 0
        fi
        for f in {staged_files}; do
          markdown-link-check --quiet "$f" 2>&1 | grep -vE "^$|^Checking|FILE:" || true
        done
