apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "forgewise.fullname" . }}
  labels:
    {{- include "forgewise.labels" . | nindent 4 }}
data:
  FORGEWISE_LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  FORGEWISE_ENABLE_MUTATIONS: {{ if .Values.config.enableMutations }}"1"{{ else }}""{{ end }}
  FORGEWISE_REQUIRE_OAUTH: {{ if .Values.oauth.requireOAuth }}"1"{{ else }}""{{ end }}
  {{- if .Values.gitlab.baseUrl }}
  GITLAB_BASE_URL: {{ .Values.gitlab.baseUrl | quote }}
  {{- end }}
