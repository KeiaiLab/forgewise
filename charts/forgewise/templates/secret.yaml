{{- if not .Values.gitlab.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "forgewise.fullname" . }}-gitlab
  labels:
    {{- include "forgewise.labels" . | nindent 4 }}
type: Opaque
data:
  # GITLAB_TOKEN 은 설치 후 kubectl 또는 ExternalSecrets 로 주입.
  # 빈 값으로 생성 — helm upgrade --set-string 또는 외부 주입 사용.
  {{ .Values.gitlab.tokenKey }}: ""
{{- end }}
