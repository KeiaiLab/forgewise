apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "forgewise.fullname" . }}
  labels:
    {{- include "forgewise.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "forgewise.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "forgewise.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: forgewise
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # forgewise-http 진입점 — HTTP MCP 서버
          command: ["forgewise-http"]
          args:
            - "--host"
            - "0.0.0.0"
            - "--port"
            - {{ .Values.service.port | quote }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "forgewise.fullname" . }}
          env:
            - name: GITLAB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "forgewise.gitlabSecretName" . }}
                  key: {{ .Values.gitlab.tokenKey }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
